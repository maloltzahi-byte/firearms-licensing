<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת זכאות לרישיון נשק | ליווי משפטי מקצועי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #faf8f5;
  --white: #ffffff;
  --ink: #1a1714;
  --ink2: #3d3830;
  --muted: #8a8278;
  --border: #e8e4de;
  --accent: #1e3a5f;
  --accent2: #c8a96e;
  --green: #1a6b3c;
  --red: #8b1a1a;
  --shadow: 0 4px 24px rgba(30,20,10,.08);
  --shadow2: 0 2px 8px rgba(30,20,10,.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  direction: rtl;
}

/* ── HEADER ── */
.site-header {
  background: var(--accent);
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-logo {
  font-family: 'Frank Ruhl Libre', serif;
  color: white;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: .3px;
}
.site-logo span { color: var(--accent2); }
.header-sub { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 2px; }

/* ── MAIN ── */
.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 36px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}
.step-dots {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  justify-content: center;
}
.step-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background .3s;
}
.step-dot.done { background: var(--accent2); }
.step-dot.active { background: var(--accent); }

/* ── STEP CARD ── */
.step-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 40px;
  box-shadow: var(--shadow);
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}

.step-num {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 12px;
  color: var(--accent2);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.step-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
  line-height: 1.25;
}

.step-subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 28px;
}

/* ── OPTIONS ── */
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  color: var(--ink);
  cursor: pointer;
  text-align: right;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-btn:hover { border-color: var(--accent); background: rgba(30,58,95,.04); }
.option-btn.selected { border-color: var(--accent); background: rgba(30,58,95,.06); font-weight: 600; }
.option-icon { font-size: 20px; flex-shrink: 0; }
.option-label { flex: 1; }
.option-note { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 400; }

/* ── INPUTS ── */
.input-group { margin-bottom: 16px; }
.input-group label { font-size: 13px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 6px; }
.input-group input, .input-group select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  color: var(--ink);
  transition: border-color .15s;
}
.input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); }
.input-note { font-size: 12px; color: var(--muted); margin-top: 5px; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── SETTLEMENT SEARCH ── */
.settlement-results {
  margin-top: -8px;
  margin-bottom: 12px;
  font-size: 13px;
}
.settlement-hit {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(30,58,95,.06);
  border: 1px solid rgba(30,58,95,.15);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  transition: background .15s;
  color: var(--accent);
  font-weight: 500;
  margin: 2px;
}
.settlement-hit:hover { background: rgba(30,58,95,.1); }
.settlement-confirmed { color: var(--green); font-size: 13px; font-weight: 600; }
.settlement-none { color: var(--muted); font-size: 13px; }

/* ── NAVIGATION ── */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  align-items: center;
}
.btn-next {
  flex: 1;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Heebo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  letter-spacing: .3px;
}
.btn-next:hover { background: #16304f; }
.btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
.btn-back {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 15px 20px;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.btn-back:hover { border-color: var(--accent); color: var(--ink); }

/* ── SUCCESS ── */
.success-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: var(--shadow);
  text-align: center;
  animation: fadeUp .4s ease both;
}
.success-icon { font-size: 56px; margin-bottom: 20px; }
.success-title { font-family: 'Frank Ruhl Libre', serif; font-size: 30px; font-weight: 700; margin-bottom: 12px; }
.success-text { font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 420px; margin: 0 auto; }
.success-accent { color: var(--accent2); font-weight: 600; }
.success-contact { margin-top: 28px; background: var(--bg); border-radius: 10px; padding: 16px 20px; font-size: 14px; }

/* ── TRUST FOOTER ── */
.trust-row {
  display: flex;
  gap: 20px;
  margin-top: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
.trust-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}

/* ── ERROR ── */
.error-msg { color: var(--red); font-size: 12px; margin-top: 6px; display: none; }

/* ── DISCLAIMER ── */
.disclaimer {
  margin-top: 24px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
  text-align: center;
  padding: 0 8px;
}
</style>

  </div>
  <div style="font-size:12px;color:rgba(255,255,255,.5)">🔒 מאובטח ופרטי</div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progress-wrap">

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  </p>

</main>

<script>
// ══════════════════════════════════════════════
// CONFIG — עדכן כאן את פרטי Supabase
// ══════════════════════════════════════════════
const SB_URL = 'https://lcvshepgzizrlqbzvjoe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjdnNoZXBneml6cmxxYnp2am9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDU5NzEsImV4cCI6MjA5MDk4MTk3MX0.ca4rw8QeRoPdQPwAsqPiLEZD6S-eOCdw6-P4a4BIFNk';

// ══════════════════════════════════════════════
// STEPS DEFINITION
// ══════════════════════════════════════════════
const STEPS = [
  {
    id: 'contact',
    num: 'שלב 1',
    title: 'נתחיל בפרטי יצירת קשר',
    subtitle: 'כדי שנוכל ליצור קשר לאחר בדיקת הבקשה.',
    type: 'inputs',
    fields: [
      { id: 'name', label: 'שם מלא', type: 'text', placeholder: 'ישראל ישראלי', required: true },
      { id: 'phone', label: 'מספר טלפון', type: 'tel', placeholder: '05X-XXXXXXX', required: true },
    ]
  },
  {
    id: 'status',
    num: 'שלב 2',
    title: 'מהו מעמדך בישראל?',
    subtitle: '',
    type: 'options',
    field: 'status',
    options: [
      { value: 'citizen', icon: '🇮🇱', label: 'אזרח ישראלי', note: 'נולדתי בישראל או קיבלתי אזרחות' },
      { value: 'permanent_resident', icon: '🏠', label: 'תושב קבע', note: 'מחזיק תעודת תושב קבע' },
      { value: 'new_immigrant', icon: '✈️', label: 'עולה חדש', note: 'עליתי לישראל לאחרונה' },
    ]
  },
  {
    id: 'age_service',
    num: 'שלב 3',
    title: 'גיל ושירות',
    subtitle: 'נתונים אלה קריטיים לבדיקת הזכאות.',
    type: 'inputs',
    fields: [
      { id: 'age', label: 'גיל', type: 'number', placeholder: '35', required: true, min: 16, max: 90 },
    ],
    extra: 'service'
  },
  {
    id: 'criterion',
    num: 'שלב 4',
    title: 'מה הסיבה העיקרית שאתה מבקש רישיון?',
    subtitle: 'בחר את הקטגוריה שהכי מתאימה למצבך.',
    type: 'options',
    field: 'criterion_group',
    options: [
      { value: 'RESIDENCY', icon: '🏘️', label: 'מגורים ביישוב', note: 'אני גר ביישוב מיוחד / מרוחק' },
      { value: 'WORK', icon: '💼', label: 'עבודה או לימודים', note: 'אני עובד או לומד ביישוב מיוחד' },
      { value: 'SECURITY_FORCES', icon: '🎖️', label: 'שירות ביטחוני', note: 'צה"ל, משטרה, גופי ביטחון' },
      { value: 'FARMER', icon: '🌾', label: 'חקלאי', note: 'חקלאי, בן משפחה של חקלאי, או עובד חקלאי' },
      { value: 'RESCUE_ORG', icon: '🚑', label: 'גוף הצלה', note: 'מד"א, זק"א, איחוד הצלה, כבאות' },
      { value: 'SPORT_SHOOTING', icon: '🎯', label: 'ספורט ירי', note: 'ספורטאי ירי פעיל מוכר' },
      { value: 'OTHER', icon: '📋', label: 'סיבה אחרת', note: 'מורה דרך, וטרינר, מדביר, מדריך ירי ועוד' },
    ]
  },
  {
    id: 'locality',
    num: 'שלב 5',
    title: 'יישוב מגורים או עבודה',
    subtitle: 'חפש את שם היישוב. אם אינו ביישוב מיוחד — רשום את שמו בכל זאת.',
    type: 'locality'
  },
  {
    id: 'contact2',
    num: 'שלב 6',
    title: 'כמה פרטים אחרונים',
    subtitle: 'כדי שנוכל להכין את התיק בצורה הטובה ביותר.',
    type: 'inputs',
    fields: [
      { id: 'residency_years', label: 'כמה שנים אתה גר בישראל ברציפות?', type: 'select',
        options: [
          { value: '', label: 'בחר...' },
          { value: '0', label: 'פחות משנה' },
          { value: '1', label: '1-2 שנים' },
          { value: '3', label: '3 שנים ומעלה' },
        ]
      },
    ],
    extra: 'flags'
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const DATA = {
  name: '', phone: '', status: '', age: '', service_type: 'none',
  criterion_group: '', settlement_id: '', settlement_name: '',
  residency_years: '3', hebrew: 'yes',
  flags: { org_auth: false, criminal: false, medical: false, late: false }
};

let currentStep = 0;
let sbConnected = false;
let searchTimeout = null;

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  if (currentStep >= STEPS.length) { renderSuccess(); return; }

  const step = STEPS[currentStep];
  updateProgress();

  const container = document.getElementById('steps-container');
  container.innerHTML = buildStep(step);

  // Auto-restore selections
  if (step.type === 'options' && DATA[step.field]) {
    document.querySelectorAll('.option-btn').forEach(btn => {
      if (btn.dataset.value === DATA[step.field]) btn.classList.add('selected');
    });
  }

  if (step.id === 'age_service') {
    if (DATA.age) document.getElementById('inp-age').value = DATA.age;
    if (DATA.service_type) {
      const sel = document.getElementById('inp-service_type');
      if (sel) sel.value = DATA.service_type;
    }
  }

  if (step.id === 'contact') {
    if (DATA.name) document.getElementById('inp-name').value = DATA.name;
    if (DATA.phone) document.getElementById('inp-phone').value = DATA.phone;
  }

  if (step.id === 'contact2') {
    const sel = document.getElementById('inp-residency_years');
    if (sel && DATA.residency_years) sel.value = DATA.residency_years;
  }

  if (step.id === 'locality' && DATA.settlement_name) {
    const inp = document.getElementById('inp-settlement');
    if (inp) inp.value = DATA.settlement_name;
    if (DATA.settlement_id) {
      const res = document.getElementById('settlement-results');
      if (res) res.innerHTML = `<span class="settlement-confirmed">✅ ${DATA.settlement_name} — יישוב זכאי מאושר</span>`;
    }
  }
}

function buildStep(step) {
  let inner = '';

  if (step.type === 'options') {
    inner = `<div class="options">${step.options.map(o =>
      `<button class="option-btn" data-value="${o.value}" onclick="selectOption('${step.field}','${o.value}',this)">
        <span class="option-icon">${o.icon}</span>
        <div class="option-label"><div>${o.label}</div><div class="option-note">${o.note}</div></div>
      </button>`
    ).join('')}</div>`;
  }

  if (step.type === 'inputs') {
    inner = step.fields.map(f => {
      if (f.type === 'select') {
        return `<div class="input-group">
          <label>${f.label}</label>
          <select id="inp-${f.id}" onchange="DATA['${f.id}']=this.value">
            ${f.options.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
          </select>
        </div>`;
      }
      return `<div class="input-group">
        <label>${f.label}${f.required ? ' *' : ''}</label>
        <input type="${f.type}" id="inp-${f.id}" placeholder="${f.placeholder || ''}"
          ${f.min ? `min="${f.min}"` : ''} ${f.max ? `max="${f.max}"` : ''}
          oninput="DATA['${f.id}']=this.value">
        <div class="error-msg" id="err-${f.id}">שדה חובה</div>
      </div>`;
    }).join('');

    if (step.extra === 'service') {
      inner += `<div class="input-group">
        <label>שירות צבאי / לאומי</label>
        <select id="inp-service_type" onchange="DATA.service_type=this.value">
          <option value="none">לא שירתי</option>
          <option value="regular_combat">שירות סדיר — לוחם</option>
          <option value="regular_2y">שירות סדיר — שנתיים ומעלה</option>
          <option value="regular_basic">שירות סדיר — שירות בסיסי</option>
          <option value="civil_2y">שירות אזרחי/לאומי — שנתיים ומעלה</option>
          <option value="civil_1y">שירות אזרחי/לאומי — שנה</option>
          <option value="amendment25_casualty">פצוע קרב (תיקון 25)</option>
          <option value="amendment25_medical">שוחרר מסיבות רפואיות (תיקון 25)</option>
        </select>
      </div>`;
    }

    if (step.extra === 'flags') {
      inner += `<div style="margin-top:8px">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--ink2)">שאלות נוספות (סמן אם רלוונטי)</div>
        <label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;font-size:14px">
          <input type="checkbox" onchange="DATA.flags.criminal=this.checked" style="width:18px;height:18px">
          יש לי עבר פלילי כלשהו
        </label>
        <label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;font-size:14px">
          <input type="checkbox" onchange="DATA.flags.org_auth=this.checked" style="width:18px;height:18px">
          אני מחזיק תעודת הרשאה לנשיאת נשק מטעם מעסיק
        </label>
        <label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px">
          <input type="checkbox" onchange="DATA.flags.medical=this.checked" style="width:18px;height:18px">
          יש לי מצב רפואי שעשוי להיות רלוונטי
        </label>
      </div>`;
    }
  }

  if (step.type === 'locality') {
    inner = `<div class="input-group">
      <label>חפש שם יישוב</label>
      <input type="text" id="inp-settlement" placeholder="הקלד שם יישוב..." oninput="searchSettlement(this.value)">
    </div>
    <div id="settlement-results" class="settlement-results"></div>
    <p class="input-note">אם לא מוצא את היישוב — הקלד בכל זאת ולחץ המשך</p>`;
  }

  const isFirst = currentStep === 0;
  const isLast = currentStep === STEPS.length - 1;
  const isOptions = step.type === 'options';

  return `<div class="step-card">
    <div class="step-num">${step.num}</div>
    <h2 class="step-title">${step.title}</h2>
    ${step.subtitle ? `<p class="step-subtitle">${step.subtitle}</p>` : ''}
    ${inner}
    <div class="nav-row">
      ${!isFirst ? `<button class="btn-back" onclick="goBack()">← חזור</button>` : ''}
      ${!isOptions ? `<button class="btn-next" id="btn-next" onclick="goNext()">${isLast ? 'שלח בקשה ←' : 'המשך ←'}</button>` : ''}
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function selectOption(field, value, btn) {
  DATA[field] = value;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => goNext(), 280);
}

function goNext() {
  const step = STEPS[currentStep];

  // Validate inputs
  if (step.type === 'inputs') {
    let valid = true;
    step.fields.filter(f => f.required).forEach(f => {
      const val = DATA[f.id];
      const errEl = document.getElementById(`err-${f.id}`);
      if (!val || val.trim() === '') {
        if (errEl) errEl.style.display = 'block';
        valid = false;
      } else {
        if (errEl) errEl.style.display = 'none';
      }
    });
    if (!valid) return;
    // Collect input values
    step.fields.forEach(f => {
      const el = document.getElementById(`inp-${f.id}`);
      if (el) DATA[f.id] = el.value;
    });
    if (step.extra === 'service') {
      const sel = document.getElementById('inp-service_type');
      if (sel) DATA.service_type = sel.value;
    }
  }

  if (step.type === 'locality') {
    const inp = document.getElementById('inp-settlement');
    if (inp && !DATA.settlement_name) DATA.settlement_name = inp.value;
  }

  if (currentStep === STEPS.length - 1) {
    submitForm();
    return;
  }

  currentStep++;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goBack() {
  if (currentStep > 0) { currentStep--; render(); window.scrollTo({top:0, behavior:'smooth'}); }
}

// ══════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════
function updateProgress() {
  const total = STEPS.length;
  const pct = Math.round((currentStep / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `שלב ${currentStep + 1} מתוך ${total}`;
  document.getElementById('progress-pct').textContent = pct + '%';

  const dots = document.getElementById('step-dots');
  dots.innerHTML = STEPS.map((_,i) =>
    `<div class="step-dot${i < currentStep ? ' done' : i === currentStep ? ' active' : ''}"></div>`
  ).join('');
}

// ══════════════════════════════════════════════
// SETTLEMENT SEARCH
// ══════════════════════════════════════════════
async function searchSettlement(val) {
  clearTimeout(searchTimeout);
  DATA.settlement_name = val;
  DATA.settlement_id = '';
  const el = document.getElementById('settlement-results');
  if (!val || val.length < 2) { el.innerHTML = ''; return; }

  if (!SB_URL || !SB_KEY) {
    el.innerHTML = '<span class="settlement-none">חיפוש אוטומטי לא זמין — רשום שם היישוב ידנית</span>';
    return;
  }

  searchTimeout = setTimeout(async () => {
    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/eligible_localities?settlement_name_he=ilike.*${encodeURIComponent(val)}*&is_active=eq.true&select=settlement_id,settlement_name_he&limit=5`,
        { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
      );
      const data = await res.json();
      if (!data.length) {
        el.innerHTML = '<span class="settlement-none">לא נמצא ברשימת היישובים הזכאים — ניתן להמשיך בכל זאת</span>';
        return;
      }
      el.innerHTML = data.map(d =>
        `<span class="settlement-hit" onclick="confirmSettlement('${d.settlement_id}','${d.settlement_name_he}')">✓ ${d.settlement_name_he}</span>`
      ).join('');
    } catch(e) {
      el.innerHTML = '<span class="settlement-none">לא ניתן לחפש כרגע — רשום שם היישוב ידנית</span>';
    }
  }, 450);
}

function confirmSettlement(id, name) {
  DATA.settlement_id = id;
  DATA.settlement_name = name;
  document.getElementById('inp-settlement').value = name;
  document.getElementById('settlement-results').innerHTML =
    `<span class="settlement-confirmed">✅ ${name} — יישוב זכאי מאושר</span>`;
}

// ══════════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════════
async function submitForm() {
  const btn = document.getElementById('btn-next');
  if (btn) { btn.disabled = true; btn.textContent = 'שולח...'; }

  // Collect remaining inputs
  const lastStep = STEPS[currentStep];
  if (lastStep.type === 'inputs') {
    lastStep.fields.forEach(f => {
      const el = document.getElementById(`inp-${f.id}`);
      if (el) DATA[f.id] = el.value;
    });
  }

  // Run basic eligibility inline
  const eligibilityPassed = checkBasicEligibility();
  const internalScore = guessScore();

  const payload = {
    full_name: DATA.name,
    phone: DATA.phone,
    applicant_data: {
      ...DATA,
      criterion: DATA.criterion_group, // hint for engine
      source: 'questionnaire',
      eligibility_status: checkBasicEligibility() ? 'CONDITIONAL' : 'NOT_ELIGIBLE',
      readiness_status: 'PARTIAL',
      lawyer_priority: 'STANDARD_REVIEW'
    },
    eligibility_passed: eligibilityPassed,
    failed_gates: [],
    eligible_routes: [],
    selected_route: null,
    risk_flags: buildRiskFlags(),
    internal_score: internalScore,
    status: 'NEW'
  };

  if (SB_URL && SB_KEY) {
    try {
      await fetch(`${SB_URL}/rest/v1/client_submissions`, {
        method: 'POST',
        headers: {
          apikey: SB_KEY,
          Authorization: `Bearer ${SB_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
    } catch(e) { console.error('Save failed', e); }
  }

  renderSuccess();
}

function checkBasicEligibility() {
  const age = parseInt(DATA.age) || 0;
  const service = DATA.service_type;
  if (service === 'regular_combat' || service === 'regular_2y' || service === 'regular_basic') return age >= 18;
  if (DATA.status === 'citizen') return age >= 27;
  if (DATA.status === 'permanent_resident') return age >= 45;
  return age >= 18;
}

function guessScore() {
  if (DATA.flags.criminal) return 'LOW';
  if (!checkBasicEligibility()) return 'LOW';
  if (DATA.flags.org_auth) return 'MEDIUM';
  if (DATA.flags.medical) return 'MEDIUM';
  return 'HIGH';
}

function buildRiskFlags() {
  const f = [];
  if (DATA.flags.criminal) f.push('CRIMINAL_RECORD');
  if (DATA.flags.org_auth) f.push('ORG_AUTHORIZATION_CONFLICT');
  if (DATA.flags.medical) f.push('MEDICAL_ISSUE');
  return f;
}

// ══════════════════════════════════════════════
// SUCCESS
// ══════════════════════════════════════════════
function renderSuccess() {
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('disclaimer').style.display = 'none';

  document.getElementById('steps-container').innerHTML = `
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h2 class="success-title">תודה, ${DATA.name.split(' ')[0] || DATA.name}!</h2>
      <p class="success-text">
        הבקשה שלך התקבלה בהצלחה.<br>
        <span class="success-accent">עורך הדין יצור איתך קשר בהקדם</span> לאחר בחינת הפרטים ובדיקת הזכאות הראשונית.
      </p>

      <div class="success-contact">
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px">לשאלות דחופות</div>
        <div style="font-size:15px;font-weight:600">📞 התקשר ישירות לעו"ד</div>
      </div>

      <div class="trust-row" style="margin-top:24px">
        <div class="trust-item">🔒 מידע מוגן</div>
        <div class="trust-item">⚖️ ליווי עו"ד מלא</div>
        <div class="trust-item">📋 תהליך מסודר</div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render();
</script>
</body>
</html>
