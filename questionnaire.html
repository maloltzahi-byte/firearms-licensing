<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון זכאות Pro</title>
<style>
:root { --bg: #f5f5f7; --blue: #0066cc; }
body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 40px 20px; }
.card { background: #fff; border-radius: 20px; padding: 40px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
.q-step { display: none; } .q-step.active { display: block; }
.q-title { font-size: 32px; font-weight: 800; margin-bottom: 24px; }
.choice { display: flex; align-items: center; gap: 12px; padding: 18px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
.choice.selected { border-color: var(--blue); background: rgba(0,102,204,0.05); }
.btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #000; color: #fff; font-weight: 700; cursor: pointer; margin-top: 20px; }
.input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ddd; margin-top: 8px; font-size: 16px; }
</style>
</head>
<body>
<div class="card" id="q-form">
  <div class="q-step active" id="qs-1">
    <div class="q-title">גיל וסטטוס</div>
    <label>מה גילך?</label><input type="number" id="f_age" class="input" placeholder="למשל: 30">
    <button class="btn" onclick="next(2)">המשך</button>
  </div>
  <div class="q-step" id="qs-2">
    <div class="q-title">בחירת תבחין</div>
    <div class="choice" onclick="selCat('residence', this)">מגורים ביישוב זכאי</div>
    <div class="choice" onclick="selCat('security', this)">כוחות הביטחון / רובאי 07</div>
    <div class="choice" onclick="selCat('work', this)">עבודה ביישוב זכאי</div>
    <button class="btn" onclick="next(3)">המשך</button>
  </div>
  <div class="q-step" id="qs-3">
    <div class="q-title">פרטי קשר</div>
    <input type="text" id="f_name" class="input" placeholder="שם מלא">
    <input type="tel" id="f_phone" class="input" placeholder="טלפון">
    <button class="btn" id="btn-submit" onclick="submit()">שלח לבדיקה</button>
  </div>
</div>
<div class="card" id="q-thanks" style="display:none; text-align:center;">
  <h1 style="color:#248a3d">✓ הבקשה נקלטה</h1>
  <p>עו"ד יחזור אליך בהקדם.</p>
</div>
<script src="app.config.js"></script>
<script>
  let cat = '';
  function next(n){ document.querySelectorAll('.q-step').forEach(s=>s.classList.remove('active')); document.getElementById('qs-'+n).classList.add('active'); }
  function selCat(c, el){ cat=c; document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); }
  async function submit(){
    const btn = document.getElementById('btn-submit'); btn.innerText='שומר...'; btn.disabled=true;
    const payload = {
      full_name: document.getElementById('f_name').value,
      phone: document.getElementById('f_phone').value,
      status: 'NEW',
      applicant_data: { age: document.getElementById('f_age').value, category: cat },
      audit: [{time: new Date().toLocaleTimeString(), text: 'נוצר בשאלון'}]
    };
    try {
      const res = await fetch(`${window.APP_CONFIG.SUPABASE_URL}/rest/v1/client_submissions`, {
        method: 'POST', headers: { 'apikey': window.APP_CONFIG.SUPABASE_ANON_KEY, 'Authorization': `Bearer ${window.APP_CONFIG.SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error(await res.text());
      document.getElementById('q-form').style.display='none'; document.getElementById('q-thanks').style.display='block';
    } catch(e) { alert('שגיאה: '+e.message); btn.innerText='נסה שוב'; btn.disabled=false; }
  }
</script>
</body>
</html>
