<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון זכאות ממוקד — רישיון כלי ירייה</title>
<style>
:root { --apple-bg: #f5f5f7; --apple-surface: #ffffff; --apple-blue: #0066cc; --apple-text: #1d1d1f; --apple-muted: #86868b; --apple-border: rgba(0, 0, 0, 0.1); --apple-green: #248a3d; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100%; font-family: -apple-system, sans-serif; background: var(--apple-bg); color: var(--apple-text); padding: 40px 20px; }
.apple-card { background: var(--apple-surface); border-radius: 16px; padding: 40px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
.q-step { display: none; } .q-step.active { display: block; }
.q-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
.q-field { margin-bottom: 20px; }
.q-label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
.q-input, .q-select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--apple-border); background: #fafafa; outline: none; }
.btn-primary { background: var(--apple-text); color: #fff; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
</style>
</head>
<body>

<div class="apple-card" id="q-form">
  <div class="q-step active" id="qs-1">
    <h1 class="q-title">פרטים אישיים</h1>
    <div class="q-field"><label class="q-label">מה גילך כיום?</label><input type="number" id="f_age" class="q-input" placeholder="למשל: 28"></div>
    <div class="q-field">
      <label class="q-label">האם התגוררת ברצף בישראל ב-3 השנים האחרונות?</label>
      <select id="f_residency" class="q-select"><option value="כן">כן</option><option value="לא">לא</option></select>
    </div>
    <button class="btn-primary" onclick="qNext(2)">המשך</button>
  </div>

  <div class="q-step" id="qs-2">
    <h1 class="q-title">עילה ופרטי קשר</h1>
    <div class="q-field">
      <label class="q-label">תבחין מרכזי:</label>
      <select id="f_category" class="q-select">
        <option value="residence">מגורים ביישוב זכאי</option>
        <option value="security">כוחות הביטחון</option>
        <option value="work">עבודה ביישוב זכאי</option>
      </select>
    </div>
    <div class="q-field"><label class="q-label">שם מלא:</label><input type="text" id="f_name" class="q-input"></div>
    <div class="q-field"><label class="q-label">טלפון:</label><input type="tel" id="f_phone" class="q-input"></div>
    <button class="btn-primary" id="btn-submit" onclick="submitToSupabase()">שלח לבדיקת משרד</button>
  </div>
</div>

<div class="apple-card" id="q-thanks" style="display:none; text-align:center;">
  <div style="font-size:48px; color:var(--apple-green); margin-bottom:16px;">✓</div>
  <h1 class="q-title">הבקשה נקלטה!</h1>
  <p>הנתונים נשמרו בענן ומועברים לעורך הדין.</p>
</div>

<script src="app.config.js"></script>
<script>
  function qNext(n) { document.querySelectorAll('.q-step').forEach(s=>s.classList.remove('active')); document.getElementById('qs-'+n).classList.add('active'); }
  
  async function submitToSupabase() {
    const btn = document.getElementById('btn-submit');
    btn.innerText = "משדר לענן..."; btn.disabled = true;
    
    const payload = {
      full_name: document.getElementById('f_name').value,
      phone: document.getElementById('f_phone').value,
      status: 'NEW',
      applicant_data: {
        age: document.getElementById('f_age').value,
        residency: document.getElementById('f_residency').value,
        category: document.getElementById('f_category').value
      }
    };

    try {
      const cfg = window.APP_CONFIG;
      const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/client_submissions`, {
        method: 'POST',
        headers: {
          'apikey': cfg.SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${cfg.SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      
      if(!res.ok) {
        const err = await res.json();
        throw new Error(err.message || "שגיאת אבטחה ב-Supabase (RLS)");
      }
      
      document.getElementById('q-form').style.display = 'none';
      document.getElementById('q-thanks').style.display = 'block';
    } catch(e) {
      alert("תקלה בשמירה: " + e.message);
      btn.innerText = "נסה שוב"; btn.disabled = false;
    }
  }
</script>
</body>
</html>
