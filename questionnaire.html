<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון זכאות ממוקד Pro</title>
<style>
:root { --apple-bg: #f5f5f7; --apple-surface: #ffffff; --apple-blue: #0066cc; --apple-text: #1d1d1f; --apple-muted: #86868b; --apple-border: rgba(0, 0, 0, 0.1); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: var(--apple-bg); color: var(--apple-text); padding: 40px 20px; -webkit-font-smoothing: antialiased; }
.card { background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 640px; margin: 0 auto; border: 1px solid var(--apple-border); }
.q-step { display: none; } .q-step.active { display: block; }
.q-title { font-size: 32px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.02em; }
.q-choice { display: flex; align-items: center; gap: 14px; padding: 18px; border-radius: 12px; border: 1px solid var(--apple-border); margin-bottom: 12px; cursor: pointer; background: #fff; transition: 0.2s; }
.q-choice:hover { border-color: var(--apple-blue); }
.q-choice.selected { border-color: var(--apple-blue); background: rgba(0,102,204,0.04); }
.indicator { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; }
.selected .indicator { border-color: var(--apple-blue); background: var(--apple-blue); }
.selected .indicator::after { content: ''; width: 8px; height: 8px; background: #fff; border-radius: 50%; }
.q-field { margin-bottom: 24px; }
.q-label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px; }
.q-input, .q-select { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--apple-border); background: #fafafa; font-size: 16px; outline: none; }
.btn-primary { background: var(--apple-text); color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px; }
</style>
</head>
<body>

<div class="card" id="q-form">
  <div class="q-step active" id="qs-1">
    <h1 class="q-title">פרטים אישיים</h1>
    <div class="q-field"><label class="q-label">גיל נוכחי:</label><input type="number" id="f_age" class="q-input" placeholder="למשל: 30"></div>
    <div class="q-field">
      <label class="q-label">האם התגוררת ברצף בישראל ב-3 השנים האחרונות?</label>
      <select id="f_residency" class="q-select"><option value="כן">כן</option><option value="לא">לא</option></select>
    </div>
    <button class="btn-primary" onclick="qNext(2)">המשך לשלב הבא</button>
  </div>

  <div class="q-step" id="qs-2">
    <h1 class="q-title">בחירת תבחין</h1>
    <p style="color:var(--apple-muted); margin-bottom:20px;">מהי עילת הזכאות המרכזית שלך?</p>
    <div class="q-choice" onclick="selectCat('residence', this)"><div class="indicator"></div><div><strong>מגורים ביישוב זכאי</strong></div></div>
    <div class="q-choice" onclick="selectCat('security', this)"><div class="indicator"></div><div><strong>כוחות הביטחון / רובאי 07</strong></div></div>
    <div class="q-choice" onclick="selectCat('work', this)"><div class="indicator"></div><div><strong>עבודה ביישוב זכאי</strong></div></div>
    <div class="q-choice" onclick="selectCat('professions', this)"><div class="indicator"></div><div><strong>תפקידים מיוחדים (חקלאי, מורה דרך)</strong></div></div>
    <button class="btn-primary" onclick="validateStep2()">המשך</button>
  </div>

  <div class="q-step" id="qs-3">
    <h1 class="q-title">סיום הנתונים</h1>
    <div class="q-field"><label class="q-label">שם מלא:</label><input type="text" id="f_name" class="q-input"></div>
    <div class="q-field"><label class="q-label">מספר טלפון:</label><input type="tel" id="f_phone" class="q-input"></div>
    <button class="btn-primary" id="btn-submit" onclick="submitToSupabase()">שלח לבדיקת משרד</button>
  </div>
</div>

<div class="card" id="q-thanks" style="display:none; text-align:center;">
  <div style="font-size:60px; color:#34c759; margin-bottom:20px;">✓</div>
  <h1 class="q-title">הבקשה נקלטה!</h1>
  <p style="font-size:18px; color:#86868b;">הנתונים נשמרו בצורה מאובטחת. עורך דין יבחן את התיק בדקות הקרובות.</p>
  <button class="btn-primary" onclick="window.location.href='dashboard.html'">מעבר לדשבורד (עו"ד)</button>
</div>

<script src="app.config.js"></script>
<script>
  let selectedCategory = '';
  function qNext(n) { document.querySelectorAll('.q-step').forEach(s=>s.classList.remove('active')); document.getElementById('qs-'+n).classList.add('active'); }
  function selectCat(cat, el) { 
    selectedCategory = cat; 
    document.querySelectorAll('.q-choice').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
  }
  function validateStep2() { if(!selectedCategory) return alert('נא לבחור תבחין'); qNext(3); }
  
  async function submitToSupabase() {
    const btn = document.getElementById('btn-submit');
    btn.innerText = "משדר לענן..."; btn.disabled = true;
    
    const payload = {
      full_name: document.getElementById('f_name').value,
      phone: document.getElementById('f_phone').value,
      status: 'NEW',
      applicant_data: {
        age: document.getElementById('f_age').value,
        residency: document.getElementById('f_residency').value,
        category: selectedCategory,
        serviceRoute: "סיים שירות סדיר – גיל 18 ומעלה"
      },
      audit: [{time: new Date().toLocaleTimeString('he-IL'), text: 'התיק נוצר ע"י הלקוח בשאלון.'}]
    };

    try {
      const res = await fetch(`${window.APP_CONFIG.SUPABASE_URL}/rest/v1/client_submissions`, {
        method: 'POST',
        headers: {
          'apikey': window.APP_CONFIG.SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${window.APP_CONFIG.SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error('שגיאת שמירה בשרת. ודא הרשאות RLS.');
      document.getElementById('q-form').style.display = 'none';
      document.getElementById('q-thanks').style.display = 'block';
    } catch(e) {
      alert("תקלה: " + e.message);
      btn.innerText = "נסה שוב"; btn.disabled = false;
    }
  }
</script>
</body>
</html>
