<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז שליטה Pro</title>
<style>
:root { --bg: #f5f5f7; --blue: #0066cc; }
body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 300px; border-left: 1px solid #ddd; background: #fff; overflow-y: auto; }
.main { flex: 1; padding: 40px; overflow-y: auto; background: #fff; }
.lead-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
.lead-item:hover { background: #f9f9f9; }
.lead-item.active { background: var(--blue); color: #fff; }
.cockpit { background: #fafafa; border: 1px solid #ddd; border-radius: 16px; padding: 30px; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
.lbl { font-size: 12px; color: #888; font-weight: 700; }
.val { font-size: 18px; font-weight: 700; }
.btn { background: #000; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>
  <div class="sidebar" id="leads-grid">טוען לידים...</div>
  <div class="main">
    <div id="empty" style="text-align:center; padding-top:100px; color:#aaa;"><h2>בחר תיק מהרשימה</h2></div>
    <div id="content" style="display:none">
      <div class="cockpit">
        <h1 id="c-name">--</h1>
        <div class="grid">
          <div><div class="lbl">גיל</div><div class="val" id="c-age">--</div></div>
          <div><div class="lbl">תבחין</div><div class="val" id="c-cat">--</div></div>
          <div><div class="lbl">סטטוס</div><div class="val" id="c-status">--</div></div>
        </div>
      </div>
      <div style="border: 1px solid #ddd; padding: 20px; border-radius: 12px;">
        <h3>1. אנליזה משפטית</h3>
        <button class="btn" onclick="run()">הפעל מנוע החלטה V27</button>
        <div id="res" style="margin-top:15px; font-weight:700;"></div>
      </div>
    </div>
  </div>
<script src="app.config.js"></script>
<script>
  let leads = []; let currentId = null;
  const cfg = window.APP_CONFIG;
  async function load(){
    const res = await fetch(`${cfg.SUPABASE_URL}/rest/v1/client_submissions?order=created_at.desc`, { headers: { 'apikey': cfg.SUPABASE_ANON_KEY, 'Authorization': `Bearer ${cfg.SUPABASE_ANON_KEY}` } });
    leads = await res.json();
    document.getElementById('leads-grid').innerHTML = leads.map(l => `<div class="lead-item ${l.id===currentId?'active':''}" onclick="sel('${l.id}')"><b>${l.full_name}</b><br><small>${l.status}</small></div>`).join('');
  }
  function sel(id){
    currentId = id; const l = leads.find(x=>x.id===id);
    document.getElementById('empty').style.display='none'; document.getElementById('content').style.display='block';
    document.getElementById('c-name').innerText = l.full_name;
    document.getElementById('c-age').innerText = l.applicant_data?.age || '--';
    document.getElementById('c-cat').innerText = l.applicant_data?.category || '--';
    document.getElementById('c-status').innerText = l.status;
    document.getElementById('res').innerText = '';
    load();
  }
  async function run(){
    const out = document.getElementById('res'); out.innerText = 'מנתח...';
    const l = leads.find(x=>x.id===currentId);
    const isOk = (l.applicant_data?.age >= 21);
    const s = isOk ? 'QUALIFIED' : 'REJECTED';
    await fetch(`${cfg.SUPABASE_URL}/rest/v1/client_submissions?id=eq.${currentId}`, { method: 'PATCH', headers: { 'apikey': cfg.SUPABASE_ANON_KEY, 'Authorization': `Bearer ${cfg.SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ status: s }) });
    out.innerText = isOk ? '✓ זכאי להגשה' : '✕ חסום: גיל';
    out.style.color = isOk ? 'green' : 'red';
    load();
  }
  load();
</script>
</body>
</html>
