<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>בדיקת זכאות משפטית — כלי ירייה</title>
<style>
:root { --bg-color: #f5f5f7; --text-primary: #1d1d1f; --text-secondary: #86868b; --accent-blue: #0071e3; --accent-blue-hover: #0077ed; --surface-glass: rgba(255, 255, 255, 0.72); --border-subtle: rgba(0, 0, 0, 0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100%; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: var(--bg-color); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
.app-viewport { display: flex; flex-direction: column; min-height: 100vh; position: relative; }
.nav-header { position: sticky; top: 0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--surface-glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); z-index: 100; }
.nav-brand { font-size: 17px; font-weight: 600; }
.main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 24px; }
.hero-title { font-size: 64px; line-height: 1.05; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 20px; text-align: center; }
.hero-subtitle { font-size: 21px; line-height: 1.4; color: var(--text-secondary); max-width: 580px; margin: 0 auto 48px; text-align: center; }
.btn { appearance: none; border: none; border-radius: 98px; padding: 16px 32px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; }
.btn-primary { background-color: var(--accent-blue); color: white; }
.btn-secondary { background-color: rgba(0, 0, 0, 0.05); color: var(--text-primary); margin-right: 12px; }

/* AI Bot */
.ai-chat-btn { position: fixed; bottom: 24px; left: 24px; background: var(--text-primary); color: #fff; border: none; border-radius: 50px; padding: 14px 20px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px; z-index: 1000; }
.ai-chat-window { position: fixed; bottom: 85px; left: 24px; width: 340px; height: 450px; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 1000; overflow: hidden; transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.3s; border: 1px solid var(--border-subtle); }
.ai-chat-window.active { transform: translateY(0); opacity: 1; pointer-events: all; }
.ai-chat-header { background: var(--bg-color); padding: 16px; font-weight: 600; display: flex; justify-content: space-between; }
.ai-chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; font-size: 14px; }
.msg-bot { background: #fff; border: 1px solid var(--border-subtle); align-self: flex-start; padding: 10px 14px; border-radius: 12px; }
.msg-user { background: var(--accent-blue); color: #fff; align-self: flex-end; padding: 10px 14px; border-radius: 12px; }
.ai-chat-input-area { padding: 12px; border-top: 1px solid var(--border-subtle); display: flex; gap: 8px; }
.ai-chat-input { flex: 1; border: 1px solid var(--border-subtle); border-radius: 20px; padding: 10px 14px; outline: none; }
</style>
</head>
<body>
<div class="app-viewport">
  <nav class="nav-header">
    <div class="nav-brand">מערכת רישוי כלי ירייה</div>
  </nav>
  <main class="main-content">
    <h1 class="hero-title">בדיקת זכאות.<br>מדויקת ובטוחה.</h1>
    <p class="hero-subtitle">מערכת מנהלית חכמה להערכת זכאות לרישיון כלי ירייה. ליווי משפטי מקצועי מהצעד הראשון.</p>
    <div>
      <a href="questionnaire.html" class="btn btn-primary">התחל בדיקה</a>
      <button onclick="openWhatsApp()" class="btn btn-secondary">התייעצות בוואטסאפ</button>
    </div>
  </main>
</div>

<button class="ai-chat-btn" onclick="toggleChat()">✨ שאל את העוזר החכם</button>
<div class="ai-chat-window" id="aiChatWindow">
  <div class="ai-chat-header"><span>✨ עוזר רישוי AI</span><button onclick="toggleChat()" style="border:none;background:none;cursor:pointer;">✕</button></div>
  <div class="ai-chat-messages" id="chatMessages"><div class="msg-bot">שלום! אני עוזר ה-AI של המשרד. כיצד אוכל לעזור לך בנושא תבחיני רישוי נשק?</div></div>
  <div class="ai-chat-input-area">
    <input type="text" id="chatInput" class="ai-chat-input" placeholder="שאל שאלה..." onkeypress="if(event.key==='Enter')sendChatMessage()">
  </div>
</div>

<script src="app.config.js"></script>
<script>
  function navigateTo(url) { window.location.href = url; }
  function openWhatsApp() {
    const cfg = window.APP_CONFIG || {};
    window.open(`https://wa.me/972${cfg.WHATSAPP_NUMBER.slice(1)}?text=${encodeURIComponent(cfg.WHATSAPP_MESSAGE)}`, '_blank');
  }
  function toggleChat() { document.getElementById('aiChatWindow').classList.toggle('active'); }
  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    appendMsg('user', text); input.value = '';
    const reply = "אני מעבד את שאלתך מול תבחיני הבט\"פ... (בגרסה המלאה Gemini יענה כאן)";
    setTimeout(() => appendMsg('bot', reply), 600);
  }
  function appendMsg(role, text) {
    const msg = document.createElement('div'); msg.className = 'msg-' + role; msg.textContent = text;
    document.getElementById('chatMessages').appendChild(msg);
  }
</script>
</body>
</html>
