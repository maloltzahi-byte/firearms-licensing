<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת זכאות משפטית — כלי ירייה</title>
<style>
:root { --bg-color: #f5f5f7; --text-primary: #1d1d1f; --text-secondary: #86868b; --accent-blue: #0071e3; --border-subtle: rgba(0, 0, 0, 0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: var(--bg-color); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
.nav-header { position: sticky; top: 0; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); z-index: 100; }
.main-content { min-height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 24px; text-align: center; }
.hero-title { font-size: 64px; line-height: 1.1; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 24px; }
.hero-subtitle { font-size: 22px; color: var(--text-secondary); max-width: 600px; margin-bottom: 48px; line-height: 1.4; }
.btn { border-radius: 98px; padding: 18px 36px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; border: none; }
.btn-primary { background-color: var(--accent-blue); color: white; }
.btn-secondary { background-color: rgba(0, 0, 0, 0.05); color: var(--text-primary); margin-right: 12px; }

/* AI Chatbot Widget */
.ai-chat-btn { position: fixed; bottom: 24px; left: 24px; background: #000; color: #fff; border: none; border-radius: 50px; padding: 14px 20px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px; z-index: 1000; }
.ai-chat-window { position: fixed; bottom: 85px; left: 24px; width: 340px; height: 450px; background: #fff; border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 1000; overflow: hidden; transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.3s; border: 1px solid var(--border-subtle); }
.ai-chat-window.active { transform: translateY(0); opacity: 1; pointer-events: all; }
.ai-chat-header { background: #f5f5f7; padding: 16px; font-weight: 700; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
.ai-chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; font-size: 14px; }
.msg-bot { background: #fff; padding: 10px 14px; border-radius: 12px; border: 1px solid #eee; align-self: flex-start; max-width: 85%; }
.msg-user { background: var(--accent-blue); color: #fff; padding: 10px 14px; border-radius: 12px; align-self: flex-end; max-width: 85%; }
.ai-chat-input-area { padding: 12px; border-top: 1px solid #eee; }
.ai-chat-input { width: 100%; border: 1px solid #ddd; border-radius: 20px; padding: 10px 14px; outline: none; }
</style>
</head>
<body>
<div class="nav-header"><div style="font-weight:700">מערכת רישוי כלי ירייה Pro</div></div>
<main class="main-content">
  <h1 class="hero-title">בדיקת זכאות.<br>מדויקת ובטוחה.</h1>
  <p class="hero-subtitle">הערכת סיכויי קבלת רישיון נשק ע"פ תבחיני המשרד לביטחון לאומי העדכניים ביותר. ליווי משפטי מלא.</p>
  <div>
    <a href="questionnaire.html" class="btn btn-primary">התחל בדיקה מקיפה</a>
    <button onclick="window.open('https://wa.me/972507520211')" class="btn btn-secondary">ייעוץ בוואטסאפ</button>
  </div>
</main>

<button class="ai-chat-btn" onclick="toggleChat()">✨ שאל את העוזר החכם</button>
<div class="ai-chat-window" id="aiChatWindow">
  <div class="ai-chat-header"><span>✨ עוזר רישוי AI</span><button onclick="toggleChat()" style="border:none;background:none;cursor:pointer;">✕</button></div>
  <div class="ai-chat-messages" id="chatMessages"><div class="msg-bot">שלום! אני עוזר ה-AI של המשרד. כיצד אוכל לעזור לך בנושא תבחיני רישוי נשק?</div></div>
  <div class="ai-chat-input-area"><input type="text" id="chatInput" class="ai-chat-input" placeholder="הקלד שאלה..." onkeypress="if(event.key==='Enter')sendChatMessage()"></div>
</div>

<script>
  function toggleChat() { document.getElementById('aiChatWindow').classList.toggle('active'); }
  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim(); if(!text) return;
    const box = document.getElementById('chatMessages');
    box.innerHTML += `<div class="msg-user">${text}</div>`;
    input.value = '';
    setTimeout(() => { box.innerHTML += `<div class="msg-bot">אני מעבד את שאלתך... (בגרסה המלאה Gemini ישיב כאן)</div>`; box.scrollTop = box.scrollHeight; }, 600);
  }
</script>
</body>
</html>
