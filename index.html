<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת זכאות משפטית — כלי ירייה</title>
<style>
:root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
h1 { font-size: 56px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.03em; }
p { font-size: 20px; color: #86868b; max-width: 600px; margin-bottom: 40px; }
.btn { text-decoration: none; padding: 18px 36px; border-radius: 50px; font-weight: 600; font-size: 18px; transition: 0.2s; }
.btn-pri { background: var(--accent); color: #fff; }
.btn-sec { background: rgba(0,0,0,0.05); color: var(--text); margin-right: 10px; }
</style>
</head>
<body>
  <h1>בדיקת זכאות.<br>מדויקת ובטוחה.</h1>
  <p>מערכת חכמה לניתוח סיכויי קבלת רישיון נשק ע"פ תבחיני המשרד לביטחון לאומי.</p>
  <div>
    <a href="questionnaire.html" class="btn btn-pri">התחל בדיקה</a>
    <a href="dashboard.html" class="btn btn-sec">דשבורד ניהול</a>
  </div>
</body>
</html>
